name: starcitizen_trader
description: StarMarket — Star Citizen trade companion with offline catalog and AI advisor.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  intl: ^0.19.0
  fl_chart: ^0.69.0
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  file_picker: ^8.1.4
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/catalog_seed.json
